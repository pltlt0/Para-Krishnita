<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div id="bg"></div>

<div class="container">

  <div id="envelope" class="envelope">
    <div class="flap"></div>
    <div class="body"></div>
    <div class="seal">❤️</div>
    <div class="text">Toca para abrir</div>
  </div>

  <div id="letter" class="letter">
    <div class="paper">

      <div class="heart">❤️</div>

      <h1>Para ti</h1>

      <p>
        Solo quería dejarte esto.<br><br>
        Aunque no hablemos tanto y estemos lejos,
        quería que supieras que me caes muy bien y siempre me acuerdo de ti.<br><br>
        Espero que tengas días bonitos, que te vaya bien en todo y que sonrías mucho ✨
      </p>

      <button id="btn">Una última cosita ❤️</button>

      <div id="extra">Cuídate mucho 🌸</div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
